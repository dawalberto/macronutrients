name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 2.0.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Create release branch
        run: |
          git checkout develop
          git checkout -b release/${{ github.event.inputs.version }}

      - name: Bump version
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"

      - name: Merge into main
        run: |
          git checkout main
          git merge --no-ff release/${{ github.event.inputs.version }}
          git tag -a v${{ github.event.inputs.version }} -m "Release ${{ github.event.inputs.version }}"

      - name: Merge back into develop
        run: |
          git checkout develop
          git merge --no-ff release/${{ github.event.inputs.version }}

      - name: Push everything
        run: git push origin main develop --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          generate_release_notes: true
